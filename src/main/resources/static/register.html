<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Folio — Înregistrare</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --ink: #0f0e0d; --paper: #f7f4ef; --cream: #ede9e1;
            --accent: #c8511a; --muted: #8a8278; --border: #d9d4cc;
        }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }
        .left {
            background: var(--ink);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem;
            position: relative;
            overflow: hidden;
        }
        .left::before {
            content: '';
            position: absolute;
            top: -100px; right: -100px;
            width: 400px; height: 400px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #fff;
            letter-spacing: -0.02em;
        }
        .brand span { color: var(--accent); font-style: italic; }
        .left-content { position: relative; z-index: 1; }
        .left-content h2 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: #fff;
            line-height: 1.3;
            margin-bottom: 1rem;
            letter-spacing: -0.02em;
        }
        .left-content p { color: var(--muted); font-size: 0.9rem; line-height: 1.7; }
        .perks { margin-top: 2rem; display: flex; flex-direction: column; gap: 0.75rem; }
        .perk {
            display: flex; align-items: center; gap: 0.75rem;
            color: rgba(255,255,255,0.7); font-size: 0.85rem;
        }
        .perk-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--accent); flex-shrink: 0;
        }
        .book-stack { display: flex; gap: 6px; align-items: flex-end; }
        .book { width: 28px; border-radius: 3px 1px 1px 3px; opacity: 0.7; }
        .right {
            display: flex; align-items: center;
            justify-content: center; padding: 3rem;
        }
        .form-container { width: 100%; max-width: 380px; }
        .form-container h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem; font-weight: 700;
            margin-bottom: 0.4rem; letter-spacing: -0.03em;
        }
        .form-container > p {
            color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem;
        }
        .form-container > p a { color: var(--accent); text-decoration: none; font-weight: 500; }
        .field { margin-bottom: 1.1rem; }
        label {
            display: block; font-size: 0.75rem; font-weight: 500;
            letter-spacing: 0.08em; text-transform: uppercase;
            color: var(--muted); margin-bottom: 0.5rem;
        }
        input {
            width: 100%; padding: 0.85rem 1rem;
            border: 1px solid var(--border); border-radius: 6px;
            background: #fff; font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem; color: var(--ink);
            transition: border-color 0.2s, box-shadow 0.2s; outline: none;
        }
        input:focus {
            border-color: var(--ink);
            box-shadow: 0 0 0 3px rgba(15,14,13,0.06);
        }
        .btn {
            width: 100%; padding: 0.9rem;
            background: var(--ink); color: #fff;
            border: none; border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem; font-weight: 500;
            cursor: pointer; margin-top: 0.5rem;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover { background: #2a2927; }
        .btn:active { transform: scale(0.99); }
        .error {
            background: #fdf2ef; border: 1px solid #f5c4b3;
            color: #c8511a; padding: 0.75rem 1rem;
            border-radius: 6px; font-size: 0.85rem;
            margin-bottom: 1rem; display: none;
        }
        .success {
            background: #f0f7f0; border: 1px solid #a8d5a8;
            color: #2d6a2d; padding: 0.75rem 1rem;
            border-radius: 6px; font-size: 0.85rem;
            margin-bottom: 1rem; display: none;
        }
    </style>
</head>
<body>
<div class="left">
    <div class="brand">Folio<span>.</span></div>
    <div class="left-content">
        <h2>Descoperă lumea cărților</h2>
        <p>Mii de titluri te așteaptă. Creează-ți contul și începe să explorezi.</p>
        <div class="perks">
            <div class="perk"><div class="perk-dot"></div>Acces la catalogul complet</div>
            <div class="perk"><div class="perk-dot"></div>Coș de cumpărături salvat</div>
            <div class="perk"><div class="perk-dot"></div>Istoric comenzi</div>
            <div class="perk"><div class="perk-dot"></div>Livrare rapidă</div>
        </div>
    </div>
    <div class="book-stack">
        <div class="book" style="height:90px;background:#c8511a;"></div>
        <div class="book" style="height:70px;background:#8a8278;"></div>
        <div class="book" style="height:110px;background:#d9d4cc;"></div>
        <div class="book" style="height:80px;background:#c8511a;opacity:0.4"></div>
    </div>
</div>

<div class="right">
    <div class="form-container">
        <h1>Cont nou</h1>
        <p>Ai deja cont? <a href="login.html">Autentifică-te</a></p>

        <div class="error" id="error"></div>
        <div class="success" id="success"></div>

        <div class="field">
            <label>Username</label>
            <input type="text" id="username" placeholder="alege un username">
        </div>
        <div class="field">
            <label>Email</label>
            <input type="email" id="email" placeholder="email@exemplu.com">
        </div>
        <div class="field">
            <label>Parolă</label>
            <input type="password" id="password" placeholder="minim 6 caractere">
        </div>
        <button class="btn" onclick="register()">Creează cont</button>
    </div>
</div>

<script>
    async function register() {
        const username = document.getElementById('username').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('error');
        const successEl = document.getElementById('success');
        errorEl.style.display = 'none';
        successEl.style.display = 'none';

        if (!username || !email || !password) {
            errorEl.textContent = 'Completează toate câmpurile.';
            errorEl.style.display = 'block';
            return;
        }

        try {
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, email, password })
            });
            const text = await res.text();
            if (!res.ok) throw new Error(text);
            successEl.textContent = 'Cont creat! Te redirecționăm...';
            successEl.style.display = 'block';
            setTimeout(() => window.location.href = 'login.html', 1500);
        } catch (e) {
            errorEl.textContent = e.message;
            errorEl.style.display = 'block';
        }
    }
</script>
</body>
</html>
