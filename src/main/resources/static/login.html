<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Libraria Belciug — Autentificare</title>
    <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap)" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --ink: #0f0e0d;
            --paper: #f7f4ef;
            --cream: #ede9e1;
            --accent: #c8511a;
            --muted: #8a8278;
            --border: #d9d4cc;
        }

        html, body {
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100vh;
            display: grid;
            grid-template-columns: 1fr 1fr;
        }

        /* LEFT PANEL */
        .left {
            background: var(--ink);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 3rem;
            position: relative;
            overflow: hidden;
        }

        .left::before {
            content: '';
            position: absolute;
            top: -100px; right: -100px;
            width: 400px; height: 400px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.06);
        }

        .left::after {
            content: '';
            position: absolute;
            bottom: -50px; left: -50px;
            width: 300px; height: 300px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.04);
        }

        .brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: #fff;
            letter-spacing: -0.02em;
        }

        .brand span { color: var(--accent); font-style: italic; }

        .left-content { position: relative; z-index: 1; }

        .left-content blockquote {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-style: italic;
            color: #fff;
            line-height: 1.3;
            margin-bottom: 1.5rem;
            letter-spacing: -0.02em;
        }

        .left-content cite {
            font-size: 0.85rem;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-style: normal;
        }

        .book-stack {
            display: flex;
            gap: 6px;
            align-items: flex-end;
        }

        .book {
            width: 28px;
            border-radius: 3px 1px 1px 3px;
            opacity: 0.7;
        }

        /* RIGHT PANEL */
        .right {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem;
        }

        .form-container {
            width: 100%;
            max-width: 380px;
        }

        .form-container h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
            letter-spacing: -0.03em;
        }

        .form-container p {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 2.5rem;
        }

        .form-container p a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .field { margin-bottom: 1.2rem; }

        label {
            display: block;
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: #fff;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            color: var(--ink);
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        input:focus {
            border-color: var(--ink);
            box-shadow: 0 0 0 3px rgba(15,14,13,0.06);
        }

        .btn {
            width: 100%;
            padding: 0.9rem;
            background: var(--ink);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            margin-top: 0.5rem;
            transition: background 0.2s, transform 0.1s;
            letter-spacing: 0.01em;
        }

        .btn:hover { background: #2a2927; }
        .btn:active { transform: scale(0.99); }

        .error {
            background: #fdf2ef;
            border: 1px solid #f5c4b3;
            color: #c8511a;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            position: relative;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: var(--border);
        }

        .divider::before { left: 0; }
        .divider::after { right: 0; }

        /* RESPONSIVE */
        @media (max-width: 900px) {
            body {
                grid-template-columns: 1fr;
                grid-auto-rows: auto;
            }

            .left {
                padding: 2.5rem 2rem;
            }

            .right {
                padding: 2.5rem 2rem;
            }

            .left-content blockquote {
                font-size: 1.8rem;
            }
        }

        @media (max-width: 768px) {
            .left {
                padding: 2rem 1.5rem;
            }

            .right {
                padding: 2rem 1.5rem;
            }

            .form-container h1 {
                font-size: 1.7rem;
            }

            .form-container p {
                margin-bottom: 2rem;
                font-size: 0.85rem;
            }

            .left-content blockquote {
                font-size: 1.6rem;
            }

            .brand {
                font-size: 1.3rem;
            }
        }

        @media (max-width: 520px) {
            /* opțional: ascundem coloana stângă pe telefoane foarte mici */
            .left {
                display: none;
            }

            body {
                grid-template-columns: 1fr;
            }

            .right {
                padding: 2rem 1.25rem;
            }

            .form-container h1 {
                font-size: 1.5rem;
            }

            input {
                padding: 0.8rem 0.9rem;
                font-size: 0.9rem;
            }

            .btn {
                padding: 0.8rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<div class="left">
    <div class="brand">LibrariaBelciug<span>.</span></div>
    <div class="left-content">
        <blockquote>"A reader lives a thousand lives before he dies."</blockquote>
        <cite>— George R.R. Martin</cite>
    </div>
    <div class="book-stack">
        <div class="book" style="height:90px;background:#c8511a;"></div>
        <div class="book" style="height:70px;background:#8a8278;"></div>
        <div class="book" style="height:110px;background:#d9d4cc;"></div>
        <div class="book" style="height:80px;background:#c8511a;opacity:0.4"></div>
        <div class="book" style="height:95px;background:#fff;opacity:0.15"></div>
    </div>
</div>

<div class="right">
    <div class="form-container">
        <h1>Bine ai revenit</h1>
        <p>Nu ai cont? <a href="register.html">Înregistrează-te</a></p>

        <div class="error" id="error"></div>

        <div class="field">
            <label>Username</label>
            <input type="text" id="username" placeholder="username-ul tău">
        </div>
        <div class="field">
            <label>Parolă</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn" onclick="login()">Intră în cont</button>

        <div class="divider">sau</div>
        <p style="text-align:center;font-size:0.85rem;color:var(--muted)">
            <a href="products.html" style="color:var(--accent);text-decoration:none">Continuă fără cont →</a>
        </p>
    </div>
</div>

<script>
    async function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const errorEl = document.getElementById('error');
        errorEl.style.display = 'none';

        if (!username || !password) {
            errorEl.textContent = 'Completează toate câmpurile.';
            errorEl.style.display = 'block';
            return;
        }

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            if (!res.ok) throw new Error('Credențiale incorecte');
            const data = await res.json();
            localStorage.setItem('token', data.token);
            localStorage.setItem('username', data.username);
            window.location.href = 'products.html';
        } catch (e) {
            errorEl.textContent = e.message;
            errorEl.style.display = 'block';
        }
    }

    document.addEventListener('keydown', e => {
        if (e.key === 'Enter') login();
    });
</script>
</body>
</html>
